# Sefaris Backend — Spring Boot yapılandırması (rehber bölüm 18)
server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: sefaris-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:postgres}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    # SMTP/S3 devre dışıyken health DOWN dönmemesi için indicator'ları kapat.
    # Coolify/uptime monitor'lar 503'ü "sağlıksız" olarak okuyabilir.
    mail:
      enabled: false
    diskspace:
      enabled: false

sefaris:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-this-is-a-256-bit-development-secret-key-0123456789}
    expiration-seconds: ${JWT_EXPIRATION:86400}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION:604800}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://sefaris.site,https://www.sefaris.site,http://localhost:3000}
  storage:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    bucket: ${S3_BUCKET:sefaris-documents}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    region: ${S3_REGION:eu-central-1}
    public-url: ${S3_PUBLIC_URL:http://localhost:9000/sefaris-documents}
    enabled: ${S3_ENABLED:false}
  mail:
    from: ${EMAIL_FROM:noreply@sefaris.site}
    from-name: ${EMAIL_FROM_NAME:Sefaris}
    enabled: ${EMAIL_ENABLED:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    site.sefaris: ${LOG_LEVEL:INFO}