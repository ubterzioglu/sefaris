# Sefaris Backend — Spring Boot yapılandırması (rehber bölüm 18)
server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: sefaris-backend

  # Varsayılan profil H2 (yerel geliştirme / CI derleme doğrulaması) — Postgres için "postgres" profili
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}

  servlet:
    multipart:
      max-file-size: 10MB      # rehber bölüm 10 — 10 MB dosya limiti
      max-request-size: 12MB

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}

# Google OAuth2 (rehber bölüm 2) — Faz 2'de client-id/secret verilince
# spring.security.oauth2.client.registration.google.* eklenecek. Boş bırakılırsa
# OAuth2ClientProperties doğrulaması patladığı için registration burada tanımlanmaz.

# === Uygulama seviyesi ayarlar ===
sefaris:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-this-is-a-256-bit-development-secret-key-0123456789}
    expiration-seconds: ${JWT_EXPIRATION:86400}
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION:604800}
  admin:
    # Admin panel tek-şifre girişi. Bu şifre eşleşirse admin kullanıcısına token verilir.
    email: ${ADMIN_EMAIL:admin@sefaris.site}
    password: ${ADMIN_PASSWORD:Sefaris2026!}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  storage:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    bucket: ${S3_BUCKET:sefaris-documents}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    region: ${S3_REGION:eu-central-1}
    public-url: ${S3_PUBLIC_URL:http://localhost:9000/sefaris-documents}
    enabled: ${S3_ENABLED:false}   # false → dosya metadata kaydı yapılır, S3'e yazılmaz (yerel derleme/test)
  mail:
    from: ${EMAIL_FROM:noreply@sefaris.site}
    from-name: ${EMAIL_FROM_NAME:Sefaris}
    enabled: ${EMAIL_ENABLED:false}  # false → e-posta gövdeleri loglanır, gönderilmez

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    site.sefaris: ${LOG_LEVEL:INFO}
