# Postgres profili — docker-compose / prod (rehber bölüm 18-19)
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/sefaris_db?sslmode=disable}
    username: ${DATABASE_USER:sefaris}
    password: ${DATABASE_PASSWORD:sefaris}
    hikari:
      maximum-pool-size: ${DATABASE_POOL_SIZE:3}
      minimum-idle: ${DATABASE_POOL_MIN_IDLE:1}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 180000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration